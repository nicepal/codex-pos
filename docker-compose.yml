version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eyz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eyz_pos
      POSTGRES_USER: eyz_user
      POSTGRES_PASSWORD: eyz_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5555:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eyz_user -d eyz_pos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eyz-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eyz-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://eyz_user:eyz_password@postgres:5432/eyz_pos
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: eyz_pos
      DB_USER: eyz_user
      DB_PASSWORD: eyz_password
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production}
      PLATFORM_DOMAIN: eyz.com
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eyz-worker
    restart: unless-stopped
    command: npm run worker
    depends_on:
      - api
      - redis
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://eyz_user:eyz_password@postgres:5432/eyz_pos
      REDIS_URL: redis://redis:6379

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eyz-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

  nginx:
    image: nginx:alpine
    container_name: eyz-nginx
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro

volumes:
  postgres_data:
  redis_data:
