upstream api_backend {
    server api:5000;
    keepalive 32;
}

upstream frontend_app {
    server frontend:80;
}

# Platform admin & main app
server {
    listen 80;
    server_name eyz.com www.eyz.com admin.eyz.com localhost;

    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

# Tenant subdomains (e.g., demo.eyz.com)
server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.eyz\.com$;

    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-Domain $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-Domain $host;
    }
}

# Custom domains (configure per tenant)
server {
    listen 80 default_server;
    server_name _;

    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-Domain $host;
    }

    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-Domain $host;
    }
}
